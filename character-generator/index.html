<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Age of Shadows — Character Creator</title>
<style>
  :root{ --bg:#15171c; --panel:#1c1f27; --panel2:#232733; --line:#2e3340;
    --text:#e6e8ee; --muted:#9aa3b2; --accent:#c79a4b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  #app{display:flex;height:100%}
  #stage{position:relative;flex:1;min-width:0}
  #canvas-host{position:absolute;inset:0}
  #hud{position:absolute;left:14px;top:12px;font-size:12px;color:var(--muted);
    background:rgba(0,0,0,.35);padding:6px 10px;border-radius:8px;pointer-events:none;line-height:1.5}
  #hud b{color:var(--text)}
  #status{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
    color:var(--text);background:rgba(0,0,0,.6);padding:14px 20px;border-radius:10px;font-size:14px;max-width:70%}
  #panel{width:340px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;height:100%}
  #panel header{padding:14px 16px;border-bottom:1px solid var(--line)}
  #panel header h1{margin:0;font-size:16px;letter-spacing:.5px}
  #panel header p{margin:4px 0 0;font-size:11px;color:var(--muted)}
  #panel header a{color:var(--accent);font-size:11px}
  #scroll{overflow-y:auto;padding:10px 14px 24px;flex:1}
  .group{margin:8px 0 14px}
  .group>.gtitle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:0 0 8px;font-weight:700}
  .row{margin:9px 0}
  .row label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .row label .val{color:var(--text);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent);height:18px}
  input[type=color]{width:100%;height:30px;border:1px solid var(--line);background:var(--panel2);border-radius:6px;cursor:pointer;padding:2px}
  .btns{display:flex;flex-wrap:wrap;gap:6px}
  .btns button{flex:1 1 auto;min-width:56px;background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:7px;padding:8px 6px;font-size:12px;cursor:pointer;transition:.12s}
  .btns button:hover{border-color:var(--accent)}
  .btns button.active{background:var(--accent);color:#15171c;border-color:var(--accent);font-weight:700}
  .toggle{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:7px 0;color:var(--muted)}
  .switch{position:relative;width:42px;height:22px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#3a3f4c;border-radius:22px;cursor:pointer;transition:.15s}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider:before{transform:translateX(20px)}
  .actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .actions button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:12px;cursor:pointer;font-weight:600}
  .actions button.primary{background:var(--accent);color:#15171c;border-color:var(--accent)}
  #toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;pointer-events:none}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="canvas-host"></div>
    <div id="hud"><b>Age of Shadows — Character Creator</b><br>Left-drag rotate • Right-drag pan • Scroll zoom</div>
    <div id="status">Loading model…</div>
    <div id="toast"></div>
  </div>
  <div id="panel">
    <header>
      <h1>Character Creator</h1>
      <p>Real rigged 3D model. <a href="./procedural.html">› sphere-builder (old)</a></p>
    </header>
    <div id="scroll"></div>
    <div class="actions">
      <button id="resetBtn">Reset</button>
      <button id="copyBtn" class="primary">Copy Config</button>
      <button id="shotBtn">Snapshot</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';
import { GLTFLoader } from './vendor/GLTFLoader.js';
import { FBXLoader } from './vendor/FBXLoader.js';

const statusEl = document.getElementById('status');
function setStatus(msg){ if(!msg){ statusEl.style.display='none'; } else { statusEl.style.display='block'; statusEl.textContent=msg; } }
function fail(msg){ statusEl.style.display='block'; statusEl.style.background='rgba(120,0,0,.85)'; statusEl.innerHTML = msg; }

const MODELS = {
  agent:     { urls:['https://pub-9e79279ca165496da153d64ecb88f99c.r2.dev/balkan__cs2_agent_model_dragomir_no1.glb','./models/peasant_realistic.glb'], label:'Operator' },
  custom:    { urls:['./models/custom.glb','./models/custom.fbx'], label:'Custom' },
  realistic: { url:'./models/peasant_realistic.glb', label:'Peasant' },
  modular:   { url:'./models/peasant_modular.glb',   label:'Modular' },
};

const DEFAULTS = {
  model: 'agent',
  anim: 0,            // clip index, or -1 for T-pose
  speed: 1.0,
  height: 1.80,
  // colors (applied by matching material names)
  skin:'', tunic:'', trousers:'', boots:'', hair:'', eyes:'', belt:'',
  // weapon (procedural, attached to the hand)
  weapon: 'none',
  weaponX: 0, weaponY: 0, weaponZ: 0,     // cm offset in the hand
  weaponSpin: 0, weaponTilt: 0, weaponRoll: 0,
  weaponScale: 100,                        // %
  // scene
  autoSpin:false, showGrid:true, bgColor:'#1b2330',
};
let S = structuredClone(DEFAULTS);

/* ---------------- scene ---------------- */
const host = document.getElementById('canvas-host');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
} catch(e){ fail('WebGL is not available in this browser.'); throw e; }
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(S.bgColor);
const camera = new THREE.PerspectiveCamera(45, 1, 0.05, 200);
camera.position.set(2.2, 1.6, 3.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 0.8; controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI*0.92;
controls.target.set(0, 0.95, 0);

scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x3a3326, 1.1));
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const key = new THREE.DirectionalLight(0xfff2dd, 1.7);
key.position.set(4,8,5); key.castShadow = true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=30;
key.shadow.camera.left=-4; key.shadow.camera.right=4; key.shadow.camera.top=5; key.shadow.camera.bottom=-2;
key.shadow.bias=-0.0004; scene.add(key);
const rim = new THREE.DirectionalLight(0x88aaff,0.55); rim.position.set(-5,4,-4); scene.add(rim);

const ground = new THREE.Mesh(new THREE.CircleGeometry(20,64), new THREE.MeshStandardMaterial({color:0x2c3322,roughness:1}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
const grid = new THREE.GridHelper(40,40,0x4a5568,0x39414f);
grid.material.opacity=0.35; grid.material.transparent=true; scene.add(grid);

/* ---------------- model loading ---------------- */
const gltfLoader = new GLTFLoader();
const fbxLoader = new FBXLoader();
function loaderFor(url){ return url.toLowerCase().endsWith('.fbx') ? fbxLoader : gltfLoader; }
const avatar = new THREE.Group();      // height scaling applies here
scene.add(avatar);
let model = null, mixer = null, clips = [], actions = [], materials = {}, handBone = null, weaponHolder = null;
const clock = new THREE.Clock();

function classifyMat(name){
  const n = (name||'').toLowerCase();
  // order matters: eyes/teeth/hair before skin so they aren't swallowed by /body/
  if (/eye|cornea|teeth|tooth|tongue/.test(n)) return 'eyes';
  if (/hair|beard|brow|stubble|fur/.test(n)) return 'hair';
  if (/skin|flesh|head|face|body|hand/.test(n)) return 'skin';
  if (/top|tunic|shirt|linen|cloth|torso|sleeve|cuff|jacket|chest|upper/.test(n)) return 'tunic';
  if (/bottom|trouser|pant|wool|leg|thigh|shin|lower/.test(n)) return 'trousers';
  if (/boot|shoe|foot|footwear/.test(n)) return 'boots';
  if (/belt|rope|strap/.test(n)) return 'belt';
  return null;
}

function loadModel(){
  setStatus('Loading model…');
  if (model){ avatar.remove(model); model = null; }
  materials = {}; handBone = null; weaponHolder = null; mixer = null; clips = []; actions = [];
  const def = MODELS[S.model];
  tryLoad(def.urls || [def.url], 0);
}

// Try each candidate URL in turn (e.g. custom.glb, then custom.fbx).
function tryLoad(urls, i){
  if (i >= urls.length){
    if (S.model === 'custom')
      fail('No custom model found.<br><small>Save your downloaded character as<br><b>character-generator/models/custom.glb</b> (or <b>custom.fbx</b>)<br>then click <b>Custom</b> again.</small>');
    else
      fail('Could not load the 3D model.');
    return;
  }
  const url = urls[i];
  loaderFor(url).load(url,
    (res) => onModelLoaded(res.scene || res, res.animations || (res.scene && res.scene.animations) || []),
    (xhr) => { if (xhr.total) setStatus('Loading model… '+Math.round(xhr.loaded/xhr.total*100)+'%'); },
    (err) => { console.warn('load failed:', url, err && err.message); tryLoad(urls, i+1); }
  );
}

function onModelLoaded(root, animations){
  model = root;
  model.traverse(o => {
    if (o.isMesh){ o.castShadow = true; o.receiveShadow = true; }
    if (o.isBone && !handBone){
      const bn = o.name.toLowerCase();
      if (/(right|_r\b|\.r\b|rhand|hand_r|righthand)/.test(bn) && /hand|wrist/.test(bn)) handBone = o;
    }
  });
  if (!handBone) model.traverse(o => { if (o.isBone && !handBone && /hand|wrist/.test(o.name.toLowerCase())) handBone = o; });

  // gather recolor-able materials by category (works for GLTF Standard + FBX Phong)
  const seen = new Set();
  model.traverse(o => {
    if (!o.isMesh) return;
    const arr = Array.isArray(o.material) ? o.material : [o.material];
    arr.forEach((m) => {
      if (!m || seen.has(m.uuid)) return;
      seen.add(m.uuid);
      const cat = classifyMat(m.name);
      if (cat){ (materials[cat] = materials[cat] || []).push(m); }
    });
  });

  // normalize: ~1.8m tall, centered, feet on the ground (handles FBX cm units too)
  let box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  model.scale.setScalar(1.8 / (size.y || 1));
  box = new THREE.Box3().setFromObject(model);
  const c = box.getCenter(new THREE.Vector3());
  model.position.x -= c.x; model.position.z -= c.z; model.position.y -= box.min.y;
  avatar.add(model);

  clips = animations || [];
  if (clips.length){ mixer = new THREE.AnimationMixer(model); actions = clips.map(c => mixer.clipAction(c)); }

  applyHeight(); applyAnim(); applyColors(); applyWeapon();
  buildUI();
  setStatus(null);
  console.log('Loaded', S.model, '| hand bone:', handBone && handBone.name, '| clips:', clips.map(c=>c.name), '| material groups:', Object.keys(materials));
}

/* ---------------- appliers ---------------- */
function applyHeight(){ const s = S.height/1.8; avatar.scale.setScalar(s); }

function applyAnim(){
  if (!mixer || !actions.length) return;
  actions.forEach(a => a.stop());
  if (S.anim >= 0 && actions[S.anim]){
    const a = actions[S.anim];
    a.reset(); a.timeScale = S.speed; a.play();
  }
}

function applyColors(){
  for (const cat of Object.keys(materials)){
    const hex = S[cat];
    if (!hex) continue;
    materials[cat].forEach(m => { m.color.set(hex); if (m.map) m.color.multiplyScalar(1); });
  }
}

function buildWeapon(kind){
  const g = new THREE.Group();
  const steel = new THREE.MeshStandardMaterial({color:0xc2c9d2, roughness:0.3, metalness:0.85});
  const wood  = new THREE.MeshStandardMaterial({color:0x6b4a2b, roughness:0.8});
  const gold  = new THREE.MeshStandardMaterial({color:0xcaa64b, roughness:0.4, metalness:0.7});
  const B=(x,y,z,w,h,d,m)=>{const e=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);e.position.set(x,y,z);e.castShadow=true;g.add(e);return e;};
  const C=(x,y,z,rt,rb,h,m,s=10)=>{const e=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s),m);e.position.set(x,y,z);e.castShadow=true;g.add(e);return e;};
  if (kind==='sword'){ B(0,0,0,.035,.16,.035,wood); B(0,.10,0,.18,.03,.04,steel); B(0,.46,0,.05,.62,.02,steel); B(0,-.10,0,.06,.06,.06,gold); }
  else if (kind==='axe'){ C(0,.18,0,.022,.022,.70,wood); const bl=new THREE.Mesh(new THREE.CylinderGeometry(.16,.16,.05,16,1,false,-0.5,1.6),steel); bl.rotation.z=Math.PI/2; bl.position.set(.02,.46,.1); g.add(bl); }
  else if (kind==='pick'){ C(0,.18,0,.022,.022,.72,wood); const h=C(0,.5,0,.018,.012,.66,steel,8); h.rotation.z=Math.PI/2; }
  else if (kind==='mace'){ C(0,.16,0,.022,.022,.55,wood); const ball=new THREE.Mesh(new THREE.IcosahedronGeometry(.10,0),steel); ball.position.y=.46; g.add(ball); }
  else if (kind==='spear'){ C(0,.2,0,.02,.02,1.4,wood); const tip=new THREE.Mesh(new THREE.ConeGeometry(.05,.24,8),steel); tip.position.y=1.02; g.add(tip); }
  else if (kind==='bow'){ const t=new THREE.Mesh(new THREE.TorusGeometry(.4,.02,8,20,Math.PI*1.3),wood); t.position.y=.2; g.add(t); C(0,.2,0,.003,.003,.8,steel,4); }
  else if (kind==='staff'){ C(0,.2,0,.025,.03,1.4,wood); const orb=new THREE.Mesh(new THREE.SphereGeometry(.09,16,14),new THREE.MeshStandardMaterial({color:0x7ec8e3,emissive:0x2a6e8a,emissiveIntensity:.6})); orb.position.y=1.0; g.add(orb); }
  else if (kind==='dagger'){ B(0,0,0,.03,.12,.03,wood); B(0,.07,0,.10,.02,.03,gold); B(0,.24,0,.04,.30,.015,steel); }
  else if (kind==='torch'){ C(0,.18,0,.018,.022,.5,wood); const fl=new THREE.Mesh(new THREE.ConeGeometry(.07,.22,10),new THREE.MeshStandardMaterial({color:0xffae33,emissive:0xff7a00,emissiveIntensity:1.4})); fl.position.y=.52; g.add(fl); const lp=new THREE.PointLight(0xff8a33,1.2,5); lp.position.y=.52; g.add(lp); }
  g.position.set(0,-0.08,0.04); g.rotation.x = -Math.PI*0.5;   // base grip orientation
  return g;
}

function applyWeapon(){
  // remove old
  if (weaponHolder && weaponHolder.parent) weaponHolder.parent.remove(weaponHolder);
  weaponHolder = null;
  if (S.weapon === 'none' || !model) return;
  const d = THREE.MathUtils.degToRad;
  weaponHolder = new THREE.Group();
  weaponHolder.position.set(S.weaponX/100, S.weaponY/100, S.weaponZ/100);
  weaponHolder.rotation.set(d(S.weaponTilt), d(S.weaponSpin), d(S.weaponRoll));
  weaponHolder.scale.setScalar(S.weaponScale/100);
  weaponHolder.add(buildWeapon(S.weapon));
  if (handBone) handBone.add(weaponHolder);
  else { weaponHolder.position.add(new THREE.Vector3(0.35,1.0,0.15)); avatar.add(weaponHolder); } // fallback if no hand bone
}

/* ---------------- render loop ---------------- */
function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  if (mixer) mixer.update(dt);
  if (S.autoSpin) avatar.rotation.y += dt*0.5;
  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
function resize(){ const w=host.clientWidth,h=host.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize);
function refreshScene(){ scene.background.set(S.bgColor); grid.visible = S.showGrid; }

/* ---------------- UI ---------------- */
const scroll = document.getElementById('scroll');
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function addGroup(t){const g=el('div','group');g.appendChild(el('div','gtitle',t));scroll.appendChild(g);return g;}
function addButtons(g,key,label,opts,onChange){
  const row=el('div','row'); row.appendChild(el('label',null,`<span>${label}</span>`));
  const wrap=el('div','btns');
  opts.forEach(([val,txt])=>{ const b=el('button',null,txt); if(S[key]===val)b.classList.add('active');
    b.onclick=()=>{ S[key]=val; wrap.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); onChange(); };
    wrap.appendChild(b); });
  row.appendChild(wrap); g.appendChild(row);
}
function addSlider(g,key,label,min,max,step,fmt,onChange){
  const row=el('div','row'); const lab=el('label'); lab.innerHTML=`<span>${label}</span><span class="val"></span>`;
  const val=lab.querySelector('.val'); const inp=el('input'); inp.type='range'; inp.min=min;inp.max=max;inp.step=step;inp.value=S[key];
  const show=()=>val.textContent=fmt?fmt(S[key]):S[key]; show();
  inp.oninput=()=>{ S[key]=parseFloat(inp.value); show(); onChange(); };
  row.appendChild(lab); row.appendChild(inp); g.appendChild(row);
}
function addColor(g,key,label,onChange){
  if (!(key in materials) && ['skin','tunic','trousers','boots','hair','eyes','belt'].includes(key) && !materials[key]) {
    // still show, but note it may not apply if model lacks that part
  }
  const row=el('div','row'); row.appendChild(el('label',null,`<span>${label}</span>`));
  const inp=el('input'); inp.type='color';
  inp.value = S[key] || currentMatColor(key) || '#888888';
  inp.oninput=()=>{ S[key]=inp.value; onChange(); };
  row.appendChild(inp); g.appendChild(row);
}
function currentMatColor(cat){ const a=materials[cat]; if(a&&a[0]) return '#'+a[0].color.getHexString(); return null; }
function addToggle(g,key,label,onChange){
  const t=el('div','toggle'); t.appendChild(el('span',null,label));
  const sw=el('label','switch'); const inp=el('input'); inp.type='checkbox'; inp.checked=!!S[key];
  sw.appendChild(inp); sw.appendChild(el('span','slider')); t.appendChild(sw);
  inp.onchange=()=>{ S[key]=inp.checked; onChange(); }; g.appendChild(t);
}

function buildUI(){
  scroll.innerHTML='';
  let g = addGroup('Model');
  addButtons(g,'model','Base model',[['agent','Operator'],['custom','Custom'],['realistic','Peasant'],['modular','Modular']], ()=>loadModel());

  g = addGroup('Animation');
  const animOpts = [['-1','T-pose']].concat(clips.map((c,i)=>[String(i), c.name.replace(/_/g,' ').slice(0,14)]));
  // animation uses index; store as number
  const arow=el('div','row'); arow.appendChild(el('label',null,'<span>Clip</span>'));
  const awrap=el('div','btns');
  animOpts.forEach(([val,txt])=>{ const b=el('button',null,txt); if(String(S.anim)===val)b.classList.add('active');
    b.onclick=()=>{ S.anim=parseInt(val); awrap.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); applyAnim(); };
    awrap.appendChild(b); });
  arow.appendChild(awrap); g.appendChild(arow);
  addSlider(g,'speed','Speed',0.1,2.5,0.1,v=>v.toFixed(1)+'x', ()=>{ actions.forEach(a=>a.timeScale=S.speed); });

  g = addGroup('Body');
  addSlider(g,'height','Height',1.4,2.1,0.01,v=>v.toFixed(2)+' m', applyHeight);

  g = addGroup('Colors');
  const colorParts = [['skin','Skin'],['hair','Hair'],['eyes','Eyes'],['tunic','Tunic / top'],['trousers','Trousers'],['boots','Boots'],['belt','Belt']];
  colorParts.forEach(([k,l])=>{ if (materials[k]) addColor(g,k,l, applyColors); });

  g = addGroup('Weapon (in hand)');
  addButtons(g,'weapon','Weapon',[['none','None'],['sword','Sword'],['axe','Axe'],['pick','Pick'],['mace','Mace'],['spear','Spear'],['bow','Bow'],['staff','Staff'],['dagger','Dagger'],['torch','Torch']], applyWeapon);
  addSlider(g,'weaponSpin','Spin',0,360,1,v=>Math.round(v)+'°', applyWeapon);
  addSlider(g,'weaponTilt','Tilt',-180,180,1,v=>Math.round(v)+'°', applyWeapon);
  addSlider(g,'weaponRoll','Roll',-180,180,1,v=>Math.round(v)+'°', applyWeapon);
  addSlider(g,'weaponScale','Size',30,200,1,v=>Math.round(v)+'%', applyWeapon);
  addSlider(g,'weaponX','Move X',-30,30,0.5,v=>v+' cm', applyWeapon);
  addSlider(g,'weaponY','Move Y',-30,30,0.5,v=>v+' cm', applyWeapon);
  addSlider(g,'weaponZ','Move Z',-30,30,0.5,v=>v+' cm', applyWeapon);
  if (!handBone) g.appendChild(el('div',null,'<div style="font-size:10.5px;color:#c98">No hand bone detected — use Move/Spin to place it.</div>'));

  g = addGroup('Scene');
  addToggle(g,'autoSpin','Auto-rotate', ()=>{});
  addToggle(g,'showGrid','Ground grid', refreshScene);
  addColor2(g,'bgColor','Background', ()=>refreshScene());
}
// plain color (not material-bound)
function addColor2(g,key,label,onChange){
  const row=el('div','row'); row.appendChild(el('label',null,`<span>${label}</span>`));
  const inp=el('input'); inp.type='color'; inp.value=S[key];
  inp.oninput=()=>{ S[key]=inp.value; onChange(); }; row.appendChild(inp); g.appendChild(row);
}

/* ---------------- actions ---------------- */
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }
document.getElementById('resetBtn').onclick=()=>{ S=structuredClone(DEFAULTS); loadModel(); toast('Reset'); };
document.getElementById('copyBtn').onclick=async()=>{ const j=JSON.stringify(S,null,2); try{await navigator.clipboard.writeText(j);toast('Config copied');}catch(e){console.log(j);toast('Copied to console');} };
document.getElementById('shotBtn').onclick=()=>{ renderer.render(scene,camera); const a=document.createElement('a'); a.href=renderer.domElement.toDataURL('image/png'); a.download='aos-character.png'; a.click(); toast('Snapshot saved'); };

/* ---------------- boot ---------------- */
resize(); refreshScene(); loadModel(); tick();
window.__AOS = { get state(){return S;}, get bones(){ const b=[]; model && model.traverse(o=>o.isBone&&b.push(o.name)); return b; } };
</script>
</body>
