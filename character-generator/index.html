<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Age of Shadows — Character Generator</title>
<style>
  :root{
    --bg:#15171c; --panel:#1c1f27; --panel2:#232733; --line:#2e3340;
    --text:#e6e8ee; --muted:#9aa3b2; --accent:#c79a4b; --accent2:#7ec8e3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  #app{display:flex;height:100%}
  #stage{position:relative;flex:1;min-width:0}
  #canvas-host{position:absolute;inset:0}
  #hud{position:absolute;left:14px;top:12px;font-size:12px;color:var(--muted);
    background:rgba(0,0,0,.35);padding:6px 10px;border-radius:8px;pointer-events:none;line-height:1.5}
  #hud b{color:var(--text)}
  #panel{width:340px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;height:100%}
  #panel header{padding:14px 16px;border-bottom:1px solid var(--line)}
  #panel header h1{margin:0;font-size:16px;letter-spacing:.5px}
  #panel header p{margin:4px 0 0;font-size:11px;color:var(--muted)}
  #scroll{overflow-y:auto;padding:10px 14px 24px;flex:1}
  .group{margin:8px 0 14px}
  .group>.gtitle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
    color:var(--accent);margin:0 0 8px;font-weight:700}
  .row{margin:9px 0}
  .row label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .row label .val{color:var(--text);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent);height:18px}
  input[type=color]{width:100%;height:30px;border:1px solid var(--line);
    background:var(--panel2);border-radius:6px;cursor:pointer;padding:2px}
  .btns{display:flex;flex-wrap:wrap;gap:6px}
  .btns button{flex:1 1 auto;min-width:58px;background:var(--panel2);color:var(--text);
    border:1px solid var(--line);border-radius:7px;padding:8px 6px;font-size:12px;cursor:pointer;transition:.12s}
  .btns button:hover{border-color:var(--accent)}
  .btns button.active{background:var(--accent);color:#15171c;border-color:var(--accent);font-weight:700}
  .presets button{background:linear-gradient(180deg,#2b3140,#222632)}
  .toggle{display:flex;align-items:center;justify-content:space-between;font-size:12px;
    padding:7px 0;color:var(--muted)}
  .switch{position:relative;width:42px;height:22px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#3a3f4c;border-radius:22px;cursor:pointer;transition:.15s}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;
    background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider:before{transform:translateX(20px)}
  .actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line)}
  .actions button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:12px;cursor:pointer;font-weight:600}
  .actions button.primary{background:var(--accent);color:#15171c;border-color:var(--accent)}
  #toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    background:rgba(0,0,0,.8);color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;
    opacity:0;transition:.25s;pointer-events:none}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div id="canvas-host"></div>
    <div id="hud">
      <b>Age of Shadows — Character Generator</b><br>
      Left-drag: rotate &nbsp;•&nbsp; Right-drag: pan &nbsp;•&nbsp; Scroll: zoom
    </div>
    <div id="toast"></div>
  </div>

  <div id="panel">
    <header>
      <h1>Character Generator</h1>
      <p>Live preview — tweak, then we bake it into the game.</p>
    </header>
    <div id="scroll"></div>
    <div class="actions">
      <button id="resetBtn">Reset</button>
      <button id="copyBtn" class="primary">Copy Config</button>
      <button id="shotBtn">Snapshot</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';

/* ============================================================
   STATE — every customizable value lives here
   ============================================================ */
const DEFAULTS = {
  // body
  height: 1.82, build: 1.05, belly: 0.0, shoulders: 1.05, headSize: 1.0,
  skin: '#c68642', eyeColor: '#3b2a18',
  // hair / face
  hairStyle: 'short',   // none short long mohawk ponytail topknot
  hairColor: '#2b1d12',
  beard: 'none',        // none stubble full
  // headgear
  headgear: 'none',     // none helm hood horned cap
  // clothing
  armor: 'tunic',       // tunic leather chain plate robe bare
  primary: '#5a4632',   // tunic/armor main
  trim: '#caa64b',      // metal/trim accent
  pants: '#3b3128', boots: '#2a1f17',
  gloves: true, belt: true,
  cape: false, capeColor: '#6e2b2b',
  // gear
  backpack: 'none',     // none pack satchel quiver
  backpackColor: '#4a3522',
  weapon: 'none',       // none sword axe pick mace spear bow staff dagger torch
  offhand: 'none',      // none shield torch dagger
  // animation
  anim: 'walk',         // idle walk run attack
  speed: 1.4,
  // scene
  autoSpin: false, showGrid: true, bgColor: '#1b2330',
};
let S = structuredClone(DEFAULTS);

/* Class presets — one click to look like an archetype. */
const PRESETS = {
  Knight:    { armor:'plate', primary:'#6f7782', trim:'#d8dde4', headgear:'helm', weapon:'sword', offhand:'shield', cape:true, capeColor:'#7a1f2b', gloves:true, boots:'#3a3a40', backpack:'none', hairStyle:'short', beard:'stubble' },
  Archer:    { armor:'leather', primary:'#5a4326', trim:'#3c2c18', headgear:'hood', weapon:'bow', offhand:'none', backpack:'quiver', backpackColor:'#3a2a18', cape:false, gloves:true, boots:'#2a1f14', hairStyle:'ponytail', beard:'none' },
  Rogue:     { armor:'leather', primary:'#2c2c33', trim:'#15151a', headgear:'hood', weapon:'dagger', offhand:'dagger', backpack:'satchel', backpackColor:'#1d1d22', cape:true, capeColor:'#1a1a1f', gloves:true, boots:'#1c1c20', hairStyle:'short', beard:'none' },
  Mage:      { armor:'robe', primary:'#33306b', trim:'#caa64b', headgear:'cap', weapon:'staff', offhand:'none', backpack:'none', cape:true, capeColor:'#23204e', gloves:false, boots:'#2a2440', hairStyle:'long', beard:'full', hairColor:'#cfcfcf', beardColor:'#cfcfcf' },
  Miner:     { armor:'tunic', primary:'#6b5230', trim:'#8a6a3a', headgear:'cap', weapon:'pick', offhand:'torch', backpack:'pack', backpackColor:'#4a3522', cape:false, gloves:true, boots:'#3a2a18', hairStyle:'short', beard:'full' },
  Barbarian: { armor:'bare', primary:'#7a5a3a', trim:'#caa64b', headgear:'horned', weapon:'axe', offhand:'none', backpack:'none', cape:true, capeColor:'#5a3a22', gloves:false, boots:'#3a2a18', belly:0.15, build:1.45, shoulders:1.2, hairStyle:'long', beard:'full' },
  Peasant:   { armor:'tunic', primary:'#6e5a3a', trim:'#8a7a5a', headgear:'none', weapon:'none', offhand:'none', backpack:'satchel', backpackColor:'#5a4a30', cape:false, gloves:false, boots:'#3a2a18', hairStyle:'short', beard:'stubble' },
};

/* ============================================================
   THREE.JS SCENE
   ============================================================ */
const host = document.getElementById('canvas-host');
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(S.bgColor);
scene.fog = new THREE.Fog(S.bgColor, 14, 40);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
camera.position.set(2.6, 1.7, 4.6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.6;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.92;
controls.target.set(0, 1.0, 0);

const hemi = new THREE.HemisphereLight(0xbfd4ff, 0x3a3326, 0.85);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xfff2dd, 1.6);
key.position.set(4, 8, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 30;
key.shadow.camera.left = -6; key.shadow.camera.right = 6;
key.shadow.camera.top = 6; key.shadow.camera.bottom = -6;
key.shadow.bias = -0.0004;
scene.add(key);
const rim = new THREE.DirectionalLight(0x88aaff, 0.55);
rim.position.set(-5, 4, -4);
scene.add(rim);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(20, 64),
  new THREE.MeshStandardMaterial({ color:0x2c3322, roughness:1 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(40, 40, 0x4a5568, 0x39414f);
grid.material.opacity = 0.35; grid.material.transparent = true;
scene.add(grid);

/* ============================================================
   HELPERS
   ============================================================ */
function mat(color, rough=0.85, metal=0.0){
  return new THREE.MeshStandardMaterial({ color:new THREE.Color(color), roughness:rough, metalness:metal });
}
// A limb: pivot at the TOP, capsule hangs DOWN by `len`.
function limb(parent, x, y, z, len, radius, material){
  const joint = new THREE.Object3D();
  joint.position.set(x, y, z);
  parent.add(joint);
  const geo = new THREE.CapsuleGeometry(radius, Math.max(0.001,len - radius*2), 6, 12);
  const mesh = new THREE.Mesh(geo, material);
  mesh.position.y = -len/2;
  mesh.castShadow = true; mesh.receiveShadow = true;
  joint.add(mesh);
  return joint;
}
function box(parent, x,y,z, w,h,d, material){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), material);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  parent.add(m); return m;
}
function cyl(parent, x,y,z, rt,rb,h, material, segs=10){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,segs), material);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  parent.add(m); return m;
}
function disposeGroup(g){
  g.traverse(o=>{ if(o.geometry) o.geometry.dispose();
    if(o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose()); } });
}

/* ============================================================
   CHARACTER
   ============================================================ */
const character = new THREE.Group();
scene.add(character);
let RIG = null;
let walkPhase = 0, attackPhase = 0;

function buildCharacter(){
  while(character.children.length) character.remove(character.children[0]);
  if (RIG && RIG.root) disposeGroup(RIG.root);

  const s = S.height / 1.80;
  const t = S.build;
  const skinMat = mat(S.skin, 0.6);
  const hairMat = mat(S.hairColor, 0.85);
  const primary = mat(S.primary, 0.85);
  const trim    = mat(S.trim, 0.4, 0.6);
  const pantsMat= mat(S.pants, 0.92);
  const bootMat = mat(S.boots, 0.7);
  const isMetal = (S.armor === 'plate' || S.armor === 'chain');
  const torsoMat = (S.armor === 'bare') ? skinMat
                 : isMetal ? mat(S.primary, 0.35, 0.75)
                 : primary;

  const root = new THREE.Group();
  character.add(root);

  const thighLen = 0.45, shinLen = 0.45, footLen = 0.26;
  const hipW = 0.11 * (1 + S.belly*0.15);
  const pelvisY = thighLen + shinLen + 0.14;

  const pelvis = new THREE.Object3D();
  pelvis.position.y = pelvisY;
  root.add(pelvis);
  box(pelvis, 0, 0, 0, 0.30*S.shoulders*0.8, 0.18, 0.20*(1+S.belly*0.25), pantsMat);
  // skirt/tassets for robe & plate
  if (S.armor === 'robe') box(pelvis, 0, -0.18, 0, 0.40, 0.4, 0.30, torsoMat);
  if (S.armor === 'plate') box(pelvis, 0, -0.08, 0.02, 0.34, 0.16, 0.26, trim);

  // ---- Torso ----
  const lowerLen = 0.26, chestLen = 0.30;
  const spine = new THREE.Object3D();
  spine.position.y = 0.09;
  pelvis.add(spine);
  box(spine, 0, lowerLen/2, 0, 0.32*(1+S.belly*0.5), lowerLen, 0.22*(1+S.belly*0.5), torsoMat);

  const chest = new THREE.Object3D();
  chest.position.y = lowerLen;
  spine.add(chest);
  const chestW = 0.40 * S.shoulders * (0.9 + t*0.15);
  box(chest, 0, chestLen/2, 0, chestW, chestLen, 0.24*(1+S.belly*0.3), torsoMat);

  // armor overlays
  if (S.armor === 'plate'){
    box(chest, 0, chestLen/2, 0.015, chestW*1.06, chestLen*0.96, 0.27*(1+S.belly*0.3), mat(S.primary,0.3,0.8));
    box(chest, 0, chestLen*0.9, 0, chestW*1.1, 0.06, 0.28, trim);      // collar
    box(chest, 0, chestLen*0.5, 0.14, 0.10, 0.20, 0.03, trim);        // chest emblem
  } else if (S.armor === 'chain'){
    box(chest, 0, chestLen/2, 0.012, chestW*1.04, chestLen*0.98, 0.26, mat(S.primary,0.45,0.65));
  } else if (S.armor === 'leather'){
    box(chest, 0, chestLen*0.5, 0.13, chestW*0.5, chestLen*0.85, 0.03, mat(S.trim,0.8)); // strap
  }

  // pauldrons (shoulder armor) for plate/chain
  if (isMetal){
    for(const sx of [-1,1]) box(chest, sx*chestW*0.55, chestLen*0.82, 0, 0.14, 0.12, 0.22, trim);
  }

  if (S.belt){
    box(spine, 0, 0.02, 0, 0.34*(1+S.belly*0.5), 0.06, 0.24*(1+S.belly*0.5), mat('#241a12',0.6));
    box(spine, 0, 0.02, 0.13, 0.07, 0.07, 0.03, trim);
  }

  // ---- Neck + Head ----
  const neck = new THREE.Object3D();
  neck.position.y = chestLen;
  chest.add(neck);
  box(neck, 0, 0.05, 0, 0.10, 0.10, 0.10, skinMat);

  const head = new THREE.Object3D();
  head.position.y = 0.10;
  neck.add(head);
  const hsz = 0.135 * S.headSize;
  const skull = new THREE.Mesh(new THREE.SphereGeometry(hsz, 24, 20), skinMat);
  skull.scale.set(0.92, 1.06, 0.96);
  skull.position.y = hsz*0.9;
  skull.castShadow = true;
  head.add(skull);
  box(head, 0, hsz*0.45, hsz*0.18, hsz*1.2, hsz*0.7, hsz*1.1, skinMat); // jaw
  box(head, 0, hsz*0.85, hsz*0.95, 0.03, 0.05, 0.05, skinMat);          // nose
  const eyeW = mat('#f2efe6',0.3), eyeI = mat(S.eyeColor, 0.3);
  for(const sx of [-1,1]){
    const e = new THREE.Mesh(new THREE.SphereGeometry(hsz*0.16,12,10), eyeW);
    e.position.set(sx*hsz*0.4, hsz*1.0, hsz*0.82); head.add(e);
    const ir = new THREE.Mesh(new THREE.SphereGeometry(hsz*0.07,10,8), eyeI);
    ir.position.set(sx*hsz*0.4, hsz*1.0, hsz*0.94); head.add(ir);
  }

  // hair (hidden under full helm/hood)
  const hairHidden = (S.headgear === 'helm' || S.headgear === 'hood');
  if (S.hairStyle !== 'none' && !hairHidden){
    if (S.hairStyle === 'short'){
      const h = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.02,20,16,0,Math.PI*2,0,Math.PI*0.62), hairMat);
      h.scale.set(0.95,1.05,0.98); h.position.y = hsz*0.95; head.add(h);
    } else if (S.hairStyle === 'long'){
      const h = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.04,20,16,0,Math.PI*2,0,Math.PI*0.6), hairMat);
      h.scale.set(0.97,1.05,1.0); h.position.y = hsz*0.95; head.add(h);
      box(head, 0, hsz*0.2, -hsz*0.7, hsz*1.6, hsz*1.9, hsz*0.4, hairMat);
    } else if (S.hairStyle === 'mohawk'){
      box(head, 0, hsz*1.4, 0, hsz*0.3, hsz*0.8, hsz*1.7, hairMat);
    } else if (S.hairStyle === 'ponytail'){
      const h = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.02,20,16,0,Math.PI*2,0,Math.PI*0.6), hairMat);
      h.scale.set(0.95,1.05,0.98); h.position.y = hsz*0.95; head.add(h);
      cyl(head, 0, hsz*0.6, -hsz*0.95, hsz*0.18, hsz*0.12, hsz*1.5, hairMat); // tail
    } else if (S.hairStyle === 'topknot'){
      const h = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.0,20,16,0,Math.PI*2,0,Math.PI*0.5), hairMat);
      h.position.y = hsz*0.95; head.add(h);
      const k = new THREE.Mesh(new THREE.SphereGeometry(hsz*0.32,12,10), hairMat);
      k.position.y = hsz*1.95; head.add(k);
    }
  }
  // beard
  if (S.beard !== 'none' && S.headgear !== 'hood'){
    const d = S.beard === 'full' ? hsz*0.55 : hsz*0.18;
    const beardMat = mat(S.beardColor || S.hairColor, 0.85);
    box(head, 0, hsz*0.35, hsz*0.55, hsz*1.15, hsz*0.9, d, beardMat);
  }
  // headgear
  buildHeadgear(head, hsz, trim, hairMat);

  // ---- Arms ----
  const armR = 0.052 * t;
  const upperLen = 0.30, foreLen = 0.28;
  const shoulderY = chestLen*0.85;
  const sleeveMat = (S.armor === 'bare') ? skinMat : (isMetal ? mat(S.primary,0.4,0.6) : primary);
  const gloveMat = S.gloves ? mat(isMetal ? S.trim : '#3a2a1a', isMetal?0.4:0.8, isMetal?0.6:0) : skinMat;
  const arms = {};
  for(const side of ['L','R']){
    const sx = side==='L' ? -1 : 1;
    const shoulder = limb(chest, sx*chestW*0.55, shoulderY, 0, upperLen, armR*1.15, sleeveMat);
    const elbow = limb(shoulder, 0, -upperLen, 0, foreLen, armR, (S.armor==='bare')?skinMat:sleeveMat);
    if (S.gloves || isMetal) box(elbow, 0, -foreLen*0.7, 0, armR*2.2, foreLen*0.5, armR*2.2, gloveMat); // bracer
    const hand = new THREE.Object3D();
    hand.position.y = -foreLen;
    elbow.add(hand);
    box(hand, 0, -0.05, 0, armR*2.2, 0.11, armR*1.8, gloveMat);
    arms[side] = { shoulder, elbow, hand };
  }

  // ---- Legs ----
  const legR = 0.07 * t;
  const legs = {};
  for(const side of ['L','R']){
    const sx = side==='L' ? -1 : 1;
    const hip = limb(pelvis, sx*hipW, -0.06, 0, thighLen, legR, pantsMat);
    const knee = limb(hip, 0, -thighLen, 0, shinLen, legR*0.85, pantsMat);
    if (isMetal) box(knee, 0, -shinLen*0.5, 0.03, legR*2.2, shinLen*0.5, legR*2.2, trim); // greave
    const ankle = new THREE.Object3D();
    ankle.position.y = -shinLen;
    knee.add(ankle);
    box(ankle, 0, -0.04, footLen*0.28, 0.12, 0.08, footLen, bootMat);
    legs[side] = { hip, knee, ankle };
  }

  // ---- Cape ----
  let cape = null;
  if (S.cape){
    cape = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.9, 4, 6),
      new THREE.MeshStandardMaterial({ color:new THREE.Color(S.capeColor), roughness:0.9, side:THREE.DoubleSide }));
    cape.position.set(0, chestLen*0.75, -0.15);
    cape.castShadow = true;
    chest.add(cape);
  }

  // ---- Backpack (on the upper back) ----
  if (S.backpack !== 'none') buildBackpack(chest, chestLen, chestW);

  // ---- Weapons ----
  if (S.weapon !== 'none') arms.R.hand.add(buildWeapon(S.weapon));
  if (S.offhand !== 'none') arms.L.hand.add(buildOffhand(S.offhand));

  root.scale.setScalar(s);
  RIG = { root, pelvis, spine, chest, neck, head, arms, legs, cape };
}

function buildHeadgear(head, hsz, trim, hairMat){
  const steel = mat(S.trim, 0.35, 0.8);
  const cloth = mat(S.primary, 0.9);
  if (S.headgear === 'helm'){
    const dome = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.12,16,14,0,Math.PI*2,0,Math.PI*0.62), steel);
    dome.scale.set(1,1.05,1.02); dome.position.y = hsz*0.95; head.add(dome);
    box(head, 0, hsz*1.0, hsz*0.95, 0.05, hsz*1.4, 0.06, steel);   // nose guard
    box(head, 0, hsz*1.7, 0, 0.05, hsz*0.7, hsz*2.0, trim);        // crest
  } else if (S.headgear === 'horned'){
    const dome = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.12,16,14,0,Math.PI*2,0,Math.PI*0.55), steel);
    dome.position.y = hsz*0.95; head.add(dome);
    for(const sx of [-1,1]){
      const horn = new THREE.Mesh(new THREE.ConeGeometry(hsz*0.22, hsz*1.3, 8), mat('#e8e2d0',0.6));
      horn.position.set(sx*hsz*1.0, hsz*1.5, 0);
      horn.rotation.z = sx*0.5; head.add(horn);
    }
  } else if (S.headgear === 'hood'){
    const hood = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.2,16,14,0,Math.PI*2,0,Math.PI*0.7), cloth);
    hood.scale.set(1.05,1.1,1.08); hood.position.y = hsz*0.85; head.add(hood);
    box(head, 0, -hsz*0.1, -hsz*0.5, hsz*2.0, hsz*1.2, hsz*1.2, cloth); // back drape
  } else if (S.headgear === 'cap'){
    const cap = new THREE.Mesh(new THREE.SphereGeometry(hsz*1.05,16,12,0,Math.PI*2,0,Math.PI*0.5), cloth);
    cap.position.y = hsz*0.95; head.add(cap);
    box(head, 0, hsz*0.9, hsz*0.9, hsz*1.6, 0.04, hsz*0.5, cloth); // brim
  }
}

function buildBackpack(chest, chestLen, chestW){
  const packMat = mat(S.backpackColor, 0.9);
  const strap = mat('#2a1f14', 0.8);
  // shoulder straps (front)
  for(const sx of [-1,1]) box(chest, sx*chestW*0.28, chestLen*0.45, 0.13, 0.05, chestLen*0.9, 0.03, strap);
  if (S.backpack === 'pack'){
    box(chest, 0, chestLen*0.55, -0.20, 0.34, 0.42, 0.20, packMat);
    box(chest, 0, chestLen*0.9, -0.20, 0.36, 0.10, 0.22, mat(S.backpackColor,0.85)); // flap
    box(chest, 0, chestLen*0.2, -0.22, 0.20, 0.14, 0.06, strap);                      // bedroll
  } else if (S.backpack === 'satchel'){
    box(chest, 0, chestLen*0.2, -0.18, 0.28, 0.26, 0.14, packMat);
  } else if (S.backpack === 'quiver'){
    const q = cyl(chest, 0.16, chestLen*0.5, -0.18, 0.06, 0.07, 0.5, packMat, 10);
    q.rotation.x = -0.25; q.rotation.z = -0.3;
    for(let i=0;i<5;i++){
      const a = cyl(chest, 0.16+(i-2)*0.02, chestLen*0.95, -0.24, 0.006,0.006,0.18, mat('#d8c8a0',0.7),6);
      a.rotation.x = -0.25; a.rotation.z=-0.3;
      const f = box(chest, 0.16+(i-2)*0.02, chestLen*1.05, -0.27, 0.03,0.04,0.005, mat('#b04030',0.8));
      f.rotation.z=-0.3;
    }
  }
}

function buildWeapon(kind){
  const g = new THREE.Group();
  const steel = mat('#c2c9d2', 0.3, 0.85);
  const wood  = mat('#6b4a2b', 0.8);
  const gold  = mat('#caa64b', 0.4, 0.7);
  if (kind === 'sword'){
    box(g, 0, 0, 0, 0.035, 0.16, 0.035, wood);
    box(g, 0, 0.10, 0, 0.18, 0.03, 0.04, steel);
    box(g, 0, 0.46, 0, 0.05, 0.62, 0.02, steel);
    box(g, 0, -0.10, 0, 0.06, 0.06, 0.06, gold);
  } else if (kind === 'axe'){
    cyl(g, 0, 0.18, 0, 0.022, 0.022, 0.70, wood);
    const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.05,16,1,false,-0.5,1.6), steel);
    blade.rotation.z = Math.PI/2; blade.position.set(0.02, 0.46, 0.1); g.add(blade);
    box(g, 0, 0.46, 0, 0.05, 0.18, 0.05, steel);
  } else if (kind === 'pick'){
    cyl(g, 0, 0.18, 0, 0.022, 0.022, 0.72, wood);
    const head = cyl(g, 0, 0.5, 0, 0.018, 0.012, 0.66, steel, 8);
    head.rotation.z = Math.PI/2;
  } else if (kind === 'mace'){
    cyl(g, 0, 0.16, 0, 0.022, 0.022, 0.55, wood);
    const ball = new THREE.Mesh(new THREE.IcosahedronGeometry(0.10,0), steel);
    ball.position.y = 0.46; g.add(ball);
    box(g, 0, 0.46, 0, 0.24, 0.05, 0.05, steel); box(g, 0, 0.46, 0, 0.05, 0.05, 0.24, steel);
  } else if (kind === 'spear'){
    cyl(g, 0, 0.2, 0, 0.02, 0.02, 1.4, wood);
    const tip = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.24, 8), steel);
    tip.position.y = 1.02; g.add(tip);
  } else if (kind === 'staff'){
    cyl(g, 0, 0.2, 0, 0.025, 0.03, 1.4, wood);
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.09,16,14),
      new THREE.MeshStandardMaterial({color:new THREE.Color(S.trim),roughness:0.1,metalness:0.2,emissive:new THREE.Color(S.trim),emissiveIntensity:0.5}));
    orb.position.y = 1.0; g.add(orb);
    box(g, 0, 0.92, 0, 0.06, 0.18, 0.06, gold);
  } else if (kind === 'dagger'){
    box(g, 0, 0, 0, 0.03, 0.12, 0.03, wood);
    box(g, 0, 0.07, 0, 0.10, 0.02, 0.03, gold);
    box(g, 0, 0.24, 0, 0.04, 0.30, 0.015, steel);
  } else if (kind === 'torch'){
    cyl(g, 0, 0.18, 0, 0.018, 0.022, 0.5, wood);
    const flame = new THREE.Mesh(new THREE.ConeGeometry(0.07,0.22,10),
      new THREE.MeshStandardMaterial({color:0xffae33,emissive:0xff7a00,emissiveIntensity:1.4,roughness:1}));
    flame.position.y = 0.52; g.add(flame);
    const lamp = new THREE.PointLight(0xff8a33, 1.4, 6); lamp.position.y=0.52; g.add(lamp);
  }
  // grip in the fist, blade up & slightly forward
  g.position.set(0, -0.08, 0.04);
  g.rotation.x = -Math.PI*0.5;
  return g;
}

function buildOffhand(kind){
  const g = new THREE.Group();
  const steel = mat('#c2c9d2', 0.35, 0.8);
  if (kind === 'shield'){
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.20,0.04,6,1), mat(S.primary,0.6,0.2));
    body.rotation.x = Math.PI/2; g.add(body);
    const rim = new THREE.Mesh(new THREE.TorusGeometry(0.24,0.02,8,6), mat(S.trim,0.4,0.6));
    g.add(rim);
    box(g, 0, 0, 0.03, 0.06, 0.20, 0.02, mat(S.trim,0.4,0.6)); // emblem
    g.position.set(0.0, -0.16, -0.02);
    g.rotation.set(Math.PI*0.5, 0, 0);
    return g;
  }
  // dagger / torch reuse the main builder, repositioned for the off hand
  const w = buildWeapon(kind);
  return w;
}

/* ============================================================
   ANIMATION
   ============================================================ */
function setArmHold(side, basePitch, elbowBend){
  RIG.arms[side].shoulder.rotation.set(basePitch, 0, side==='R'?-0.12:0.12);
  RIG.arms[side].elbow.rotation.x = elbowBend;
}

function animateRig(dt){
  if (!RIG) return;
  const holdR = S.weapon !== 'none';
  const holdL = S.offhand !== 'none';
  const twoH = (S.weapon === 'bow' || S.weapon === 'staff' || S.weapon === 'spear');

  // reset
  RIG.arms.L.shoulder.rotation.set(0,0,0); RIG.arms.R.shoulder.rotation.set(0,0,0);
  RIG.arms.L.elbow.rotation.set(0,0,0); RIG.arms.R.elbow.rotation.set(0,0,0);
  RIG.pelvis.rotation.set(0,0,0); RIG.chest.rotation.set(0,0,0); RIG.head.rotation.set(0,0,0);

  if (S.anim === 'walk' || S.anim === 'run'){
    const fast = S.anim === 'run';
    walkPhase += dt * S.speed * (fast?5.2:3.4);
    const p = walkPhase;
    const swing = fast?0.95:0.62, armSwing = fast?0.8:0.5, kneeBend = fast?1.2:0.9;
    RIG.legs.L.hip.rotation.x = Math.sin(p) * swing;
    RIG.legs.R.hip.rotation.x = Math.sin(p + Math.PI) * swing;
    RIG.legs.L.knee.rotation.x = Math.max(0, -Math.sin(p - 0.4)) * kneeBend;
    RIG.legs.R.knee.rotation.x = Math.max(0, -Math.sin(p + Math.PI - 0.4)) * kneeBend;
    RIG.legs.L.ankle.rotation.x = Math.cos(p)*0.2;
    RIG.legs.R.ankle.rotation.x = Math.cos(p+Math.PI)*0.2;
    RIG.root.position.y = Math.abs(Math.sin(p)) * (fast?0.07:0.04);
    RIG.pelvis.rotation.y = Math.sin(p)*0.08;
    RIG.chest.rotation.x = fast?0.25:0.05;
    RIG.chest.rotation.y = -Math.sin(p)*0.06;
    // arms
    if (holdR){ setArmHold('R', -0.5+Math.sin(p)*0.05, -1.7); }
    else { RIG.arms.R.shoulder.rotation.x = Math.sin(p+Math.PI)*armSwing; RIG.arms.R.elbow.rotation.x = -0.2-Math.max(0,Math.sin(p+Math.PI))*0.3; }
    if (holdL){ setArmHold('L', -0.5+Math.sin(p+Math.PI)*0.05, -1.7); }
    else { RIG.arms.L.shoulder.rotation.x = Math.sin(p)*armSwing; RIG.arms.L.elbow.rotation.x = -0.2-Math.max(0,Math.sin(p))*0.3; }
    if (twoH){ setArmHold('L', -0.7, -1.3); setArmHold('R', -0.6, -1.3); }
  } else if (S.anim === 'attack'){
    attackPhase += dt * 3.0;
    const a = (Math.sin(attackPhase)*0.5+0.5); // 0..1
    // legs planted, slight stance
    RIG.legs.L.hip.rotation.x = 0.15; RIG.legs.R.hip.rotation.x = -0.15;
    RIG.legs.L.knee.rotation.x = 0.2; RIG.legs.R.knee.rotation.x = 0.2;
    RIG.root.position.y = 0;
    RIG.chest.rotation.y = -0.2 + a*0.4;
    if (twoH){
      setArmHold('L', -0.7-a*0.6, -1.0); setArmHold('R', -0.6-a*0.6, -1.0);
    } else {
      // overhead chop with right arm
      RIG.arms.R.shoulder.rotation.set(-2.4 + a*2.6, 0, -0.1);
      RIG.arms.R.elbow.rotation.x = -0.4 - a*0.6;
      if (holdL) setArmHold('L', -0.5, -1.6);
      else { RIG.arms.L.shoulder.rotation.set(0.1,0,0.2); RIG.arms.L.elbow.rotation.x=-0.5; }
    }
  } else { // idle
    walkPhase += dt;
    const b = Math.sin(walkPhase*1.5);
    RIG.legs.L.hip.rotation.x = 0; RIG.legs.R.hip.rotation.x = 0;
    RIG.legs.L.knee.rotation.x = 0; RIG.legs.R.knee.rotation.x = 0;
    RIG.legs.L.ankle.rotation.x = 0; RIG.legs.R.ankle.rotation.x = 0;
    RIG.root.position.y = b*0.008;
    if (holdR) setArmHold('R', -0.5, -1.7);
    else { RIG.arms.R.shoulder.rotation.set(0.04 - b*0.02,0,-0.10); RIG.arms.R.elbow.rotation.x=-0.18; }
    if (holdL) setArmHold('L', -0.5, -1.7);
    else { RIG.arms.L.shoulder.rotation.set(0.04 + b*0.02,0,0.10); RIG.arms.L.elbow.rotation.x=-0.18; }
    if (twoH){ setArmHold('L', -0.7, -1.3); setArmHold('R', -0.6, -1.3); }
    RIG.head.rotation.y = Math.sin(walkPhase*0.5)*0.05;
  }

  if (RIG.cape){
    const sway = (S.anim==='run'?0.4:S.anim==='walk'?0.2:0.05);
    RIG.cape.rotation.x = 0.12 + Math.sin(walkPhase*2)*sway*0.3;
  }
}

/* ============================================================
   RENDER LOOP
   ============================================================ */
const clock = new THREE.Clock();
function tick(){
  const dt = Math.min(clock.getDelta(), 0.05);
  animateRig(dt);
  if (S.autoSpin) character.rotation.y += dt*0.6;
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
function resize(){
  const w = host.clientWidth, h = host.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize);

function refreshScene(){
  scene.background.set(S.bgColor);
  scene.fog.color.set(S.bgColor);
  grid.visible = S.showGrid;
}
function rebuild(){ buildCharacter(); refreshScene(); }

/* ============================================================
   UI
   ============================================================ */
const scroll = document.getElementById('scroll');
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function addGroup(title){ const g=el('div','group'); g.appendChild(el('div','gtitle',title)); scroll.appendChild(g); return g; }
function addSlider(g, key, label, min, max, step, fmt){
  const row = el('div','row');
  const lab = el('label'); lab.innerHTML = `<span>${label}</span><span class="val"></span>`;
  const val = lab.querySelector('.val');
  const input = el('input'); input.type='range'; input.min=min; input.max=max; input.step=step; input.value=S[key];
  const show=()=> val.textContent = fmt ? fmt(S[key]) : S[key];
  show();
  input.addEventListener('input', ()=>{ S[key]=parseFloat(input.value); show();
    if (key==='speed') return; rebuild(); });
  row.appendChild(lab); row.appendChild(input); g.appendChild(row);
}
function addColor(g, key, label){
  const row = el('div','row');
  row.appendChild(el('label', null, `<span>${label}</span>`));
  const input = el('input'); input.type='color'; input.value=S[key];
  input.addEventListener('input', ()=>{ S[key]=input.value; if(key==='bgColor') refreshScene(); else rebuild(); });
  row.appendChild(input); g.appendChild(row);
}
function addButtons(g, key, label, options){
  const row = el('div','row');
  row.appendChild(el('label', null, `<span>${label}</span>`));
  const wrap = el('div','btns');
  options.forEach(([val,txt])=>{
    const b=el('button',null,txt);
    if(S[key]===val) b.classList.add('active');
    b.addEventListener('click', ()=>{ S[key]=val;
      wrap.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); rebuild(); });
    wrap.appendChild(b);
  });
  row.appendChild(wrap); g.appendChild(row);
}
function addToggle(g, key, label){
  const t = el('div','toggle'); t.appendChild(el('span',null,label));
  const sw = el('label','switch');
  const input=el('input'); input.type='checkbox'; input.checked=!!S[key];
  sw.appendChild(input); sw.appendChild(el('span','slider')); t.appendChild(sw);
  input.addEventListener('change', ()=>{ S[key]=input.checked;
    if(key==='showGrid'||key==='autoSpin') refreshScene(); else rebuild(); });
  g.appendChild(t);
}
function addPresets(g){
  const row = el('div','row presets');
  const wrap = el('div','btns');
  Object.keys(PRESETS).forEach(name=>{
    const b=el('button',null,name);
    b.addEventListener('click', ()=>{ Object.assign(S, structuredClone(PRESETS[name])); buildUI(); rebuild(); toast(name+' preset'); });
    wrap.appendChild(b);
  });
  row.appendChild(wrap); g.appendChild(row);
}

function buildUI(){
  scroll.innerHTML='';
  let g = addGroup('Class Presets'); addPresets(g);

  g = addGroup('Pose & Animation');
  addButtons(g, 'anim', 'Animation', [['idle','Idle'],['walk','Walk'],['run','Run'],['attack','Attack']]);
  addSlider(g, 'speed', 'Speed', 0.4, 3.0, 0.1, v=>v.toFixed(1)+'x');

  g = addGroup('Weapons & Gear');
  addButtons(g, 'weapon', 'Main hand', [['none','None'],['sword','Sword'],['axe','Axe'],['pick','Pick'],['mace','Mace'],['spear','Spear'],['bow','Bow'],['staff','Staff'],['dagger','Dagger'],['torch','Torch']]);
  addButtons(g, 'offhand', 'Off hand', [['none','None'],['shield','Shield'],['torch','Torch'],['dagger','Dagger']]);
  addButtons(g, 'backpack', 'Backpack', [['none','None'],['pack','Pack'],['satchel','Satchel'],['quiver','Quiver']]);
  addColor(g, 'backpackColor', 'Pack color');

  g = addGroup('Body');
  addSlider(g, 'height', 'Height', 1.4, 2.1, 0.01, v=>v.toFixed(2)+' m');
  addSlider(g, 'build', 'Build / muscle', 0.7, 1.6, 0.01, v=>Math.round(v*100)+'%');
  addSlider(g, 'belly', 'Weight / girth', 0, 1, 0.02, v=>Math.round(v*100)+'%');
  addSlider(g, 'shoulders', 'Shoulder width', 0.8, 1.3, 0.01, v=>Math.round(v*100)+'%');
  addSlider(g, 'headSize', 'Head size', 0.8, 1.25, 0.01, v=>Math.round(v*100)+'%');
  addColor(g, 'skin', 'Skin tone');

  g = addGroup('Head');
  addButtons(g, 'headgear', 'Headgear', [['none','None'],['helm','Helm'],['hood','Hood'],['horned','Horned'],['cap','Cap']]);
  addButtons(g, 'hairStyle', 'Hair', [['none','Bald'],['short','Short'],['long','Long'],['ponytail','Ponytail'],['topknot','Topknot'],['mohawk','Mohawk']]);
  addColor(g, 'hairColor', 'Hair color');
  addButtons(g, 'beard', 'Beard', [['none','None'],['stubble','Stubble'],['full','Full']]);
  addColor(g, 'eyeColor', 'Eye color');

  g = addGroup('Armor & Clothing');
  addButtons(g, 'armor', 'Outfit', [['tunic','Tunic'],['leather','Leather'],['chain','Chain'],['plate','Plate'],['robe','Robe'],['bare','Bare']]);
  addColor(g, 'primary', 'Main color');
  addColor(g, 'trim', 'Trim / metal');
  addColor(g, 'pants', 'Pants');
  addColor(g, 'boots', 'Boots');
  addToggle(g, 'gloves', 'Gloves / bracers');
  addToggle(g, 'belt', 'Belt');
  addToggle(g, 'cape', 'Cape');
  addColor(g, 'capeColor', 'Cape color');

  g = addGroup('Scene');
  addToggle(g, 'autoSpin', 'Auto-rotate');
  addToggle(g, 'showGrid', 'Ground grid');
  addColor(g, 'bgColor', 'Background');
}

/* ============================================================
   ACTIONS
   ============================================================ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1600);
}
document.getElementById('resetBtn').onclick = ()=>{ S = structuredClone(DEFAULTS); buildUI(); rebuild(); toast('Reset to defaults'); };
document.getElementById('copyBtn').onclick = async ()=>{
  const json = JSON.stringify(S, null, 2);
  try{ await navigator.clipboard.writeText(json); toast('Config copied to clipboard'); }
  catch(e){ console.log(json); toast('Copied to console (clipboard blocked)'); }
};
document.getElementById('shotBtn').onclick = ()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a'); a.href=renderer.domElement.toDataURL('image/png'); a.download='aos-character.png'; a.click();
  toast('Snapshot saved');
};

/* ============================================================
   BOOT
   ============================================================ */
buildUI();
rebuild();
resize();
tick();
window.__AOS = { get state(){return S;}, rebuild };
</script>
</body>
</html>
